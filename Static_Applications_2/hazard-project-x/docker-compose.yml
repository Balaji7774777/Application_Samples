version: "3.9"

services:

  postgres:

    image: postgres:16

    container_name: hazard-postgres

    restart: always

    environment:
      POSTGRES_USER: hazard_admin
      POSTGRES_PASSWORD: hazard_password
      POSTGRES_DB: hazard_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:

  postgres_data: